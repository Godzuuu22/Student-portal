<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — CHCC Portal</title>
    <link rel="stylesheet" href="../css/style.css?v=5">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar-admin .avatar { background: rgba(51, 128, 204, 0.1); color: var(--primary); }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar sidebar-admin">
            <div class="sidebar-brand">
                <div class="brand-name">CHCC <span>Portal</span></div>
                <div class="brand-sub">Admin Console</div>
            </div>
            
            <div class="sidebar-user">
                <div class="avatar teal"><i class="ph-bold ph-shield-check"></i></div>
                <div class="sidebar-user-info">
                    <div class="name">Administrator</div>
                    <div class="role-badge">System Root</div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section-label">Main</div>
                <a href="#" class="nav-item active" id="nav-dashboard"><i class="ph-bold ph-chart-line-up"></i> Overview</a>
                <a href="#" class="nav-item" id="nav-students"><i class="ph-bold ph-users-three"></i> Students</a>
                <a href="#" class="nav-item" id="nav-subjects"><i class="ph-bold ph-books"></i> Subjects</a>
                <a href="#" class="nav-item" id="nav-enrollments"><i class="ph-bold ph-calendar-plus"></i> Enrollments</a>
                <a href="#" class="nav-item" id="nav-grades"><i class="ph-bold ph-graduation-cap"></i> Grades</a>
                
                <div class="nav-section-label">Portal Assets</div>
                <a href="#" class="nav-item" id="nav-announcements"><i class="ph-bold ph-megaphone"></i> Announcements</a>
                <a href="#" class="nav-item" id="nav-schedule"><i class="ph-bold ph-palette"></i> Branding & Schedule</a>
                <a href="#" class="nav-item" id="nav-materials"><i class="ph-bold ph-folder-open"></i> Materials</a>
            </nav>
            
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout"><i class="ph-bold ph-sign-out"></i> Sign Out</button>
            </div>
        </aside>
        
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        
        <main class="main-content">
            <header class="main-header">
                <div style="display:flex; align-items:center; gap:16px;">
                    <button id="mobile-toggle" style="display:none; background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer;">
                        <i class="ph-bold ph-list"></i>
                    </button>
                    <div>
                    <h1 id="page-title">Admin Dashboard</h1>
                    <div id="welcome-sub" class="subtitle-text">System performance and management portal</div>
                </div>
                <div class="header-actions" style="display:flex; align-items:center; gap:20px;">
                    <div class="search-bar" style="display: flex; align-items:center; background: rgba(0,0,0,0.03); border-radius: 12px; padding: 4px 16px;">
                        <i class="ph-bold ph-magnifying-glass" style="color:var(--text-light)"></i>
                        <input type="text" placeholder="Search system..." style="border:none; background:transparent; padding:10px; font-size:14px; outline:none; width:200px;">
                    </div>
                    <div class="notif-btn" style="background:rgba(0,0,0,0.03); border-radius:12px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                        <i class="ph-bold ph-bell" style="font-size:20px; color:var(--primary)"></i>
                    </div>
                </div>
            </header>

            <div id="content-area" class="page">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <div id="form-modal" class="modal-drawer-overlay">
        <div class="modal-drawer">
            <div class="drawer-header"><div class="drawer-title" id="modal-title">Form</div><button class="drawer-close" onclick="closeModal()"><i class="ph-bold ph-x"></i></button></div>
            <div class="drawer-body"><div id="modal-alert" class="alert"></div><div id="modal-body-content"></div></div>
            <div class="drawer-footer"><button type="button" class="btn" style="background:#f1f5f9; color:var(--text-main);" onclick="closeModal()">Cancel</button><button type="button" class="btn btn-primary" id="modal-submit">Save Changes</button></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
            
            // Search logic
            const searchInput = document.querySelector('.search-bar input');
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.data-table tbody tr').forEach(row => {
                    row.style.display = row.textContent.toLowerCase().includes(term) ? 'table-row' : 'none';
                });
            });

            loadDashboard();

            document.querySelectorAll('.nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    const id = e.currentTarget.id;
                    if (id === 'nav-dashboard') loadDashboard();
                    else if (id === 'nav-students') loadStudents();
                    else if (id === 'nav-subjects') loadSubjects();
                    else if (id === 'nav-enrollments') loadEnrollments();
                    else if (id === 'nav-grades') loadGrades();
                    else if (id === 'nav-announcements') loadAnnouncements();
                    else if (id === 'nav-schedule') loadScheduleAdmin();
                    else if (id === 'nav-materials') loadMaterialsAdmin();
                });
            });
        });

        const contentArea = document.getElementById('content-area');
        const pageTitle = document.getElementById('page-title');
        const welcomeSub = document.getElementById('welcome-sub');
        contentArea.style.marginTop = '20px';

        function startLoad() { 
            contentArea.innerHTML = `
                <div class="bento-grid" style="animation: fadeIn 0.3s ease;">
                    <div class="bento-item bento-span-4" style="padding:32px"><div class="skeleton-box skeleton-text"></div><div class="skeleton-box skeleton-title"></div></div>
                    <div class="bento-item bento-span-4" style="padding:32px"><div class="skeleton-box skeleton-text"></div><div class="skeleton-box skeleton-title"></div></div>
                    <div class="bento-item bento-span-4" style="padding:32px"><div class="skeleton-box skeleton-text"></div><div class="skeleton-box skeleton-title"></div></div>
                    <div class="bento-item bento-span-12" style="padding:32px; height: 400px;"><div class="skeleton-box skeleton-card" style="height:100%"></div></div>
                </div>
            `;
            contentArea.classList.remove('fade-in'); 
        }
        function endLoad() { contentArea.classList.add('fade-in'); }

        function openModal(title, bodyHtml, onSubmit) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body-content').innerHTML = bodyHtml;
            document.getElementById('form-modal').classList.add('active');
            const submitBtn = document.getElementById('modal-submit');
            const newSubmitBtn = submitBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newSubmitBtn, submitBtn);
            newSubmitBtn.addEventListener('click', onSubmit);
        }
        function closeModal() { document.getElementById('form-modal').classList.remove('active'); }

        async function loadDashboard() {
            pageTitle.textContent = 'System Overview';
            welcomeSub.textContent = 'Real-time performance and registration data';
            startLoad();
            try {
                const stats = await fetchAPI('/admin/stats');
                contentArea.innerHTML = `
                    <div class="bento-grid" style="margin-bottom:32px;">
                        <div class="bento-item bento-span-4 premium-card stat-card-premium accent-blue animate-item-1">
                            <i class="ph-bold ph-users-three stat-icon-bg" style="color:var(--primary)"></i>
                            <div style="font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; margin-bottom:8px;">Total Students</div>
                            <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:800; color:var(--primary); line-height:1;">${stats.students}</div>
                            <div class="sparkline-trend trend-up"><i class="ph-bold ph-trend-up"></i> +5% this month</div>
                        </div>
                        <div class="bento-item bento-span-4 premium-card stat-card-premium accent-amber animate-item-2">
                            <i class="ph-bold ph-books stat-icon-bg" style="color:var(--accent)"></i>
                            <div style="font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; margin-bottom:8px;">Active Subjects</div>
                            <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:800; color:var(--primary); line-height:1;">${stats.subjects}</div>
                            <div class="sparkline-trend" style="background:rgba(0,0,0,0.05); color:var(--text-main);"><i class="ph-bold ph-minus"></i> No change</div>
                        </div>
                        <div class="bento-item bento-span-4 premium-card stat-card-premium accent-emerald animate-item-3">
                            <i class="ph-bold ph-calendar-plus stat-icon-bg" style="color:var(--success)"></i>
                            <div style="font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; margin-bottom:8px;">Total Enrollments</div>
                            <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:800; color:var(--primary); line-height:1;">${stats.enrollments}</div>
                            <div class="sparkline-trend trend-up"><i class="ph-bold ph-trend-up"></i> +12% this month</div>
                        </div>

                        <!-- Enrollment Trend Chart -->
                        <div class="bento-item bento-span-8 premium-card accent-gradient animate-item-4">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);">
                                <span class="card-title">Institutional Growth Chart</span>
                                <div class="badge badge-success" style="box-shadow: 0 4px 10px rgba(5, 150, 105, 0.2);">System Live</div>
                            </div>
                            <div style="padding:24px; height:320px;">
                                <canvas id="enrollmentChart"></canvas>
                            </div>
                        </div>

                        <!-- Status Check -->
                        <div class="bento-item bento-span-4 premium-card animate-item-5" style="background:linear-gradient(135deg, var(--primary), var(--primary-mid)); color:white;">
                            <div style="font-family:'Outfit',sans-serif; font-weight:800; font-size:22px; margin-bottom:20px; color:var(--accent);">System Health</div>
                            <div style="display:flex; flex-direction:column; gap:16px;">
                                <div style="display:flex; align-items:center; gap:12px; padding:12px; background:rgba(255,255,255,0.08); border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                                    <div style="width:10px; height:10px; border-radius:50%; background:#10b981; box-shadow:0 0 10px #10b981; animation: pulse 2s infinite;"></div>
                                    <div style="font-size:13px; font-weight:700;">Database: <span style="color:#d1fae5; font-weight:400;">Connected</span></div>
                                </div>
                                <div style="display:flex; align-items:center; gap:12px; padding:12px; background:rgba(255,255,255,0.08); border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                                    <div style="width:10px; height:10px; border-radius:50%; background:#10b981; box-shadow:0 0 10px #10b981; animation: pulse 2s infinite;"></div>
                                    <div style="font-size:13px; font-weight:700;">API Gateway: <span style="color:#d1fae5; font-weight:400;">Operational</span></div>
                                </div>
                                <div style="margin-top:8px; opacity:0.7; font-size:11px; line-height:1.6; font-weight:500;">
                                    Monitoring ${window.location.hostname}...<br>
                                    Last Checkup: ${new Date().toLocaleTimeString()}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                endLoad();
                initCharts();
            } catch (err) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${err.message}</div>`; }
        }

        function initCharts() {
            const ctx = document.getElementById('enrollmentChart').getContext('2d');
            
            // Premium Gradient for the chart
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(45, 108, 192, 0.3)');
            gradient.addColorStop(1, 'rgba(45, 108, 192, 0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Enrollment Count',
                        data: [12, 19, 15, 25, 22, 30],
                        borderColor: '#2D6CC0',
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#2D6CC0',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.03)', drawBorder: false },
                            ticks: { color: '#94A3B8', font: { family: 'Inter', size: 12 } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94A3B8', font: { family: 'Inter', size: 12 } }
                        }
                    }
                }
            });
        }

        async function loadSubjects() {
            pageTitle.textContent = 'Subject Management';
            welcomeSub.textContent = 'Configure course catalogs and descriptions';
            startLoad();
            try {
                const subjects = await fetchAPI('/admin/subjects');
                let html = `
                    <div class="modern-header-banner animate-fade-up" style="height:120px; margin-bottom:32px;">
                        <div style="position:absolute; bottom:20px; left:32px;">
                            <h2 style="color:white; font-family:'Outfit',sans-serif; font-size:28px;">Subject Repository</h2>
                            <p style="color:rgba(255,255,255,0.7); font-size:13px;">Manage institutional course catalogs</p>
                        </div>
                        <button class="btn btn-primary" style="position:absolute; bottom:20px; right:32px; padding:10px 20px; border-radius:12px;" onclick="showSubjectModal()"><i class="ph-bold ph-plus"></i> Add Subject</button>
                    </div>
                    <div class="identity-grid-v2">
                `;
                if (!subjects.length) html += `<div style="padding:64px; text-align:center; color:var(--text-light); grid-column:span 4;"><i class="ph-bold ph-books" style="font-size:48px; margin-bottom:16px;"></i><br>No subjects found.</div>`;
                else subjects.forEach((sub, index) => { 
                    html += `
                        <div class="identity-card-v2 vivid-amber stagger-${(index % 6) + 1}">
                            <div class="identity-icon-v2"><i class="ph-bold ph-book-bookmark"></i></div>
                            <div class="identity-info-v2" style="flex:1">
                                <div class="label">${sub.code}</div>
                                <div class="value">${sub.name}</div>
                            </div>
                            <button class="btn" style="background:rgba(220, 38, 38, 0.1); color:var(--danger); padding:8px; border-radius:10px;" onclick="deleteSubject(${sub.id})"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    `;
                });
                html += `</div>`;
                contentArea.innerHTML = html;
                endLoad();
            } catch(e) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${e.message}</div>`; }
        }

        function showSubjectModal() {
            const body = `<div class="form-group"><label>Subject Code</label><input type="text" id="sub-code" class="form-control" placeholder="CS101"></div><div class="form-group"><label>Subject Name</label><input type="text" id="sub-name" class="form-control" placeholder="Computer Science Fundamentals"></div><div class="form-group"><label>Description</label><textarea id="sub-desc" class="form-control" rows="3"></textarea></div>`;
            openModal('Add New Subject', body, async () => {
                try { await fetchAPI('/admin/subjects', { method: 'POST', body: JSON.stringify({ code: document.getElementById('sub-code').value, name: document.getElementById('sub-name').value, description: document.getElementById('sub-desc').value }) }); closeModal(); loadSubjects(); } catch(e) { showAlert(e.message, 'error', 'modal-alert'); }
            });
        }
        async function deleteSubject(id) { if(confirm("Delete this subject?")) { await fetchAPI(`/admin/subjects/${id}`, { method: 'DELETE' }); loadSubjects(); } }

        async function loadStudents() {
            pageTitle.textContent = 'Student Records';
            welcomeSub.textContent = 'Manage active student credentials and profiles';
            startLoad();
            try {
                const data = await fetchAPI('/admin/students');
                let html = `<div class="identity-grid">`;
                if (!data.length) html = `<div class="premium-card accent-rose" style="padding:64px; text-align:center; color:var(--text-light); grid-column:span 3;"><i class="ph-bold ph-users-three" style="font-size:48px; margin-bottom:16px;"></i><br>No student records found.</div>`;
                else data.forEach((row, index) => { 
                    html += `
                        <div class="premium-card identity-card accent-blue animate-item-${(index % 6) + 1}">
                            <div class="identity-card-header">
                                <div class="identity-avatar" style="background:var(--primary); color:white">${row.first_name.charAt(0)}</div>
                                <div class="identity-info">
                                    <div class="identity-name">${row.first_name} ${row.last_name}</div>
                                    <div class="identity-sub">@${row.username}</div>
                                </div>
                            </div>
                            <div style="font-size:13px; color:var(--text-muted); padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.03); display:flex; align-items:center; gap:8px;">
                                <i class="ph-bold ph-envelope" style="color:var(--primary-light)"></i> ${row.email}
                            </div>
                            <div class="identity-actions" style="margin-top: 16px;">
                                <button class="btn btn-primary" style="padding:8px 16px; font-size:12px; border-radius: 10px;" onclick="alert('View full profile...')">Details</button>
                                <button class="btn" style="background:rgba(220, 38, 38, 0.1); color:var(--danger); padding:8px 12px; border-radius:10px;" onclick="deleteStudent(${row.id})"><i class="ph-bold ph-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                contentArea.innerHTML = html;
                endLoad();
            } catch(e) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${e.message}</div>`; }
        }
        async function deleteStudent(id) { if(confirm("Delete student account?")) { await fetchAPI(`/admin/students/${id}`, { method: 'DELETE' }); loadStudents(); } }
        
        async function loadEnrollments() {
             pageTitle.textContent = 'Enrollment Management';
             welcomeSub.textContent = 'Assign students to specific subjects and semesters';
             startLoad();
             try {
                const data = await fetchAPI('/admin/enrollments');
                const colors = ['vivid-violet', 'vivid-amber', 'vivid-emerald', 'vivid-rose', 'vivid-azure'];
                let html = `
                    <div class="modern-header-banner animate-fade-up" style="height:120px; background:linear-gradient(135deg, #10b981, #059669); margin-bottom:32px;">
                        <div style="position:absolute; bottom:20px; left:32px;">
                            <h2 style="color:white; font-family:'Outfit',sans-serif; font-size:28px;">Institutional Enrollments</h2>
                            <p style="color:rgba(255,255,255,0.7); font-size:13px;">Manage student subjects and schedules</p>
                        </div>
                        <button class="btn btn-primary" style="position:absolute; bottom:20px; right:32px; padding:10px 20px; border-radius:12px;" onclick="showEnrollmentModal()"><i class="ph-bold ph-user-plus"></i> New Enrollment</button>
                    </div>
                    <div class="identity-grid-v2">
                `;
                if(!data.length) html += `<div style="padding:64px; text-align:center; color:var(--text-light); grid-column:span 4;"><i class="ph-bold ph-calendar-plus" style="font-size:48px; margin-bottom:16px;"></i><br>No enrollments found.</div>`;
                else data.forEach((row, index) => { 
                    const vividClass = colors[index % colors.length];
                    html += `
                        <div class="identity-card-v2 ${vividClass} stagger-${(index % 6) + 1}">
                            <div class="identity-icon-v2"><i class="ph-bold ph-student"></i></div>
                            <div class="identity-info-v2" style="flex:1">
                                <div class="label">${row.first_name} ${row.last_name}</div>
                                <div class="value">${row.subject_name}</div>
                                <div style="font-size:10px; font-weight:700; color:var(--text-muted); margin-top:4px;">${row.semester} • ${row.code}</div>
                            </div>
                            <button class="btn" style="background:rgba(220, 38, 38, 0.1); color:var(--danger); padding:8px; border-radius:10px;" onclick="deleteEnrollment(${row.id})"><i class="ph-bold ph-x-circle"></i></button>
                        </div>
                    `;
                });
                html += `</div>`;
                contentArea.innerHTML = html;
                endLoad();
            } catch(e) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${e.message}</div>`; }
        }
        async function showEnrollmentModal() {
            try {
                const [students, subjects] = await Promise.all([fetchAPI('/admin/students'), fetchAPI('/admin/subjects')]);
                let sOptions = students.map(s => `<option value="${s.id}">${s.first_name} ${s.last_name}</option>`).join('');
                let subOptions = subjects.map(s => `<option value="${s.id}">${s.code} - ${s.name}</option>`).join('');
                const body = `<div class="form-group"><label>Student</label><select id="enr-student" class="form-control">${sOptions}</select></div><div class="form-group"><label>Subject</label><select id="enr-subject" class="form-control">${subOptions}</select></div><div class="form-group"><label>Semester</label><input type="text" id="enr-sem" class="form-control" placeholder="2nd Semester 2026"></div>`;
                openModal('Assign Schedule', body, async () => { await fetchAPI('/admin/enrollments', { method: 'POST', body: JSON.stringify({ student_id: document.getElementById('enr-student').value, subject_id: document.getElementById('enr-subject').value, semester: document.getElementById('enr-sem').value }) }); closeModal(); loadEnrollments(); });
            } catch(e) { console.error(e); }
        }
        async function deleteEnrollment(id) { if(confirm("Remove enrollment?")) { await fetchAPI(`/admin/enrollments/${id}`, { method: 'DELETE' }); loadEnrollments(); } }

        async function loadGrades() {
            pageTitle.textContent = 'Grade Management';
            welcomeSub.textContent = 'Post and update official final grades for students';
            startLoad();
            try {
                const data = await fetchAPI('/admin/grades');
                let html = `
                    <div class="modern-header-banner animate-fade-up" style="height:120px; background:linear-gradient(135deg, #f43f5e, #be123c); margin-bottom:32px;">
                        <div style="position:absolute; bottom:20px; left:32px;">
                            <h2 style="color:white; font-family:'Outfit',sans-serif; font-size:28px;">Grade Repository</h2>
                            <p style="color:rgba(255,255,255,0.7); font-size:13px;">Publish official academic performance records</p>
                        </div>
                        <button class="btn btn-primary" style="position:absolute; bottom:20px; right:32px; padding:10px 20px; border-radius:12px;" onclick="showGradeModal()"><i class="ph-bold ph-pencil-simple"></i> Encode Grade</button>
                    </div>
                    <div class="grade-list" style="max-width: 900px; margin: 0 auto;">
                `;
                if(!data.length) html += `<div style="text-align:center; padding:64px;"><i class="ph-bold ph-chart-bar" style="font-size:48px; color:var(--text-light); opacity:0.1;"></i><br><span style="color:var(--text-light); font-size:15px;">No grade records published.</span></div>`;
                else data.forEach((row, index) => { 
                    const g = parseFloat(row.grade);
                    let orbColor = '#10b981'; // Success
                    if (g > 2.5 && g <= 3.0) orbColor = '#f59e0b'; // Warning
                    else if (g > 3.0 || row.grade === '5.0' || row.grade === '5.00') orbColor = '#f43f5e'; // Danger

                    html += `
                        <div class="admin-grade-card stagger-${(index % 6) + 1}">
                            <div class="grade-orb-v2 admin" style="--orb-color: ${orbColor}">${row.grade}</div>
                            <div class="grade-info">
                                <div style="font-weight:700; color:var(--primary); font-size:18px;">${row.first_name} ${row.last_name}</div>
                                <div style="font-size:13px; color:var(--text-muted); font-weight:600;">${row.subject_code} • Final Grade</div>
                            </div>
                            <button class="btn" style="background:rgba(220, 38, 38, 0.1); color:var(--danger); padding:10px; border-radius:12px;" onclick="deleteGrade(${row.id})"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    `;
                });
                html += `</div>`;
                contentArea.innerHTML = html;
                endLoad();
            } catch(e){ contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${e.message}</div>`; }
        }
        async function showGradeModal() {
            try {
                const enrollments = await fetchAPI('/admin/enrollments');
                let eOptions = enrollments.map(e => `<option value="${e.id}">${e.first_name} ${e.last_name} — ${e.subject_name}</option>`).join('');
                const body = `<div class="form-group"><label>Select Enrollment</label><select id="grade-enrollment" class="form-control">${eOptions}</select></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;"><div class="form-group"><label>Grade</label><input type="text" id="grade-value" class="form-control" placeholder="1.00"></div><div class="form-group"><label>Remarks</label><input type="text" id="grade-remarks" class="form-control" placeholder="Passed"></div></div>`;
                openModal('Post Final Grade', body, async () => { await fetchAPI('/admin/grades', { method: 'POST', body: JSON.stringify({ enrollment_id: document.getElementById('grade-enrollment').value, grade: document.getElementById('grade-value').value, remarks: document.getElementById('grade-remarks').value }) }); closeModal(); loadGrades(); });
            } catch(e) { console.error(e); }
        }
        async function deleteGrade(id) { if(confirm("Delete grade record?")) { await fetchAPI(`/admin/grades/${id}`, { method: 'DELETE' }); loadGrades(); } }

        async function loadAnnouncements() {
            pageTitle.textContent = 'Announcements';
            welcomeSub.textContent = 'Publish portal-wide news and important notifications';
            startLoad();
            try {
                const data = await fetchAPI('/features/announcements');
                let html = `
                    <div class="premium-card accent-violet animate-item-1" style="padding:0; margin-top:20px;">
                        <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);">
                            <span class="card-title">Portal-wide Broadcasts</span>
                            <button class="btn btn-primary" style="padding:8px 16px; border-radius:10px; font-size:13px;" onclick="showAnnouncementModal()"><i class="ph-bold ph-megaphone-simple"></i> New Announcement</button>
                        </div>
                        <div class="data-table-container">
                            <table class="table-premium">
                                <thead><tr><th>Title</th><th>Date Published</th><th>Author</th></tr></thead>
                                <tbody>
                `;
                if(!data.length) html += `<tr><td colspan="3" style="text-align:center; padding:64px;"><i class="ph-bold ph-megaphone-simple" style="font-size:48px; color:var(--text-light); opacity:0.2;"></i><br><span style="color:var(--text-light); font-size:15px;">No announcements published yet.</span></td></tr>`;
                else data.forEach(row => { html += `<tr><td><strong style="color:var(--primary); font-size:15px;">${row.title}</strong></td><td><span style="color:var(--text-muted); font-weight:600;">${new Date(row.date).toLocaleDateString()}</span></td><td><span class="badge" style="background:rgba(51, 128, 204, 0.08); color:var(--primary); font-weight:700;"><i class="ph-bold ph-user-circle" style="margin-right:4px;"></i> ${row.author || 'Admin'}</span></td></tr>`; });
                html += `</tbody></table></div></div>`;
                contentArea.innerHTML = html;
                endLoad();
            } catch (e) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${e.message}</div>`; }
        }
        function showAnnouncementModal() {
            const body = `<div class="form-group"><label>Title</label><input type="text" id="ann-title" class="form-control" required></div><div class="form-group"><label>Content</label><textarea id="ann-content" class="form-control" rows="4" required></textarea></div><div class="form-group"><label>Cover Image</label><input type="file" id="ann-image" class="form-control" accept="image/*"></div>`;
            openModal('Post Announcement', body, async () => {
                const formData = new FormData(); formData.append('title', document.getElementById('ann-title').value); formData.append('content', document.getElementById('ann-content').value);
                const file = document.getElementById('ann-image').files[0]; if(file) formData.append('ann_image', file);
                await fetch('/api/features/announcements', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData });
                closeModal(); loadAnnouncements();
            });
        }

        async function loadScheduleAdmin() {
            pageTitle.textContent = 'Branding & Schedule';
            welcomeSub.textContent = 'Update visual assets and the master class schedule';
            startLoad();
            contentArea.innerHTML = `
                <div class="bento-grid" style="margin-bottom:24px;">
                    <div class="bento-item bento-span-4 premium-card accent-blue animate-item-1" style="padding:0;">
                        <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">System Theme Wallpaper</span></div>
                        <div style="padding:24px;"><form onsubmit="uploadBackground(event)"><div class="form-group"><label>Upload New Background</label><input type="file" id="bg-file" class="form-control" accept="image/*" required></div><button type="submit" class="btn btn-primary btn-block" style="padding:14px; border-radius:12px;" id="bg-btn"><i class="ph-bold ph-image"></i> Update Wallpaper</button></form></div>
                    </div>
                    <div class="bento-item bento-span-4 premium-card accent-emerald animate-item-2" style="padding:0;">
                        <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Weekly Class Schedule</span></div>
                        <div style="padding:24px;"><form onsubmit="uploadSchedule(event)"><div class="form-group"><label>Schedule Sheet Graphic</label><input type="file" id="schedule-file" class="form-control" accept="image/*" required></div><button type="submit" class="btn btn-primary btn-block" style="padding:14px; border-radius:12px; background:var(--success)" id="sch-btn"><i class="ph-bold ph-calendar"></i> Upload Weekly</button></form></div>
                    </div>
                    <div class="bento-item bento-span-4 premium-card accent-rose animate-item-3" style="padding:0;">
                        <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Examination Schedule</span></div>
                        <div style="padding:24px;"><form onsubmit="uploadExamSchedule(event)"><div class="form-group"><label>Exam Schedule Graphic</label><input type="file" id="exam-file" class="form-control" accept="image/*" required></div><button type="submit" class="btn btn-primary btn-block" style="padding:14px; border-radius:12px; background:var(--danger)" id="exam-btn"><i class="ph-bold ph-calendar-check"></i> Upload Exam</button></form></div>
                    </div>
                    <div class="bento-item bento-span-12 premium-card accent-azure animate-item-4" style="padding:0; margin-top:24px;">
                        <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Section Room Assignments</span></div>
                        <div style="padding:24px; display:flex; gap:24px; align-items:flex-start;">
                            <div style="flex:1;">
                                <form onsubmit="uploadSectionSchedule(event)">
                                    <div class="form-group"><label>Room Assignment Guide</label><input type="file" id="section-file" class="form-control" accept="image/*" required></div>
                                    <button type="submit" class="btn btn-primary btn-block" style="padding:14px; border-radius:12px; background:var(--primary-light)" id="sec-btn"><i class="ph-bold ph-map-trifold"></i> Upload Section Guide</button>
                                </form>
                            </div>
                            <div id="current-schedule-preview" style="flex:1; border-radius:12px; overflow:hidden; border:1px solid rgba(0,0,0,0.05);">
                                <div style="padding:12px; background:rgba(0,0,0,0.02); text-align:center; font-size:11px; font-weight:700;">LIVE PREVIEW (Weekly)</div>
                                <div id="preview-container" style="min-height:200px; display:flex; align-items:center; justify-content:center; background:#f8fafc;">
                                    <img id="branding-preview-img" style="max-width:100%; height:auto; display:none;">
                                    <i id="preview-placeholder" class="ph-bold ph-eye" style="font-size:32px; color:var(--text-light)"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Add live preview fetch
            try {
                const data = await fetchAPI('/features/schedule');
                if(data.schedule_image) {
                    const img = document.getElementById('branding-preview-img');
                    const placeholder = document.getElementById('preview-placeholder');
                    img.src = data.schedule_image;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                }
            } catch(e) {}

            endLoad();
            try {
                const data = await fetchAPI('/features/schedule');
                const viewArea = document.getElementById('current-schedule');
                if (data.schedule_image) viewArea.innerHTML = `<img src="${data.schedule_image}" style="width:100%; height:auto;">`;
                else viewArea.innerHTML = `<div style="padding:64px; color:var(--text-light);"><i class="ph-bold ph-image-broken" style="font-size:48px; margin-bottom:12px;"></i><br>No schedule uploaded</div>`;
            } catch(e) {}
            endLoad();
        }
        async function uploadBackground(e) {
            e.preventDefault(); const btn = document.getElementById('bg-btn'); btn.disabled = true; btn.innerHTML = '<i class="ph-bold ph-circle-notch ph-spin"></i> Uploading...';
            const formData = new FormData(); formData.append('bg_image', document.getElementById('bg-file').files[0]);
            try { await fetch('/api/features/background', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData }); window.location.reload(); } catch(err) { btn.disabled = false; btn.innerHTML = 'Update Wallpaper'; }
        }
        async function uploadSchedule(e) {
            e.preventDefault();
            const file = document.getElementById('schedule-file').files[0];
            const btn = document.getElementById('sch-btn');
            const formData = new FormData(); formData.append('schedule_image', file);
            
            btn.innerHTML = '<i class="ph-bold ph-circle-notch ph-spin"></i> Processing...';
            try {
                await fetchAPI('/features/schedule', { method: 'POST', body: formData });
                showAlert('success', 'Weekly Schedule Updated!');
                loadScheduleAdmin();
            } catch (err) { showAlert('error', err.message); }
            finally { btn.innerHTML = '<i class="ph-bold ph-calendar"></i> Upload Weekly'; }
        }

        async function uploadExamSchedule(e) {
            e.preventDefault();
            const file = document.getElementById('exam-file').files[0];
            const btn = document.getElementById('exam-btn');
            const formData = new FormData(); formData.append('exam_schedule_image', file);
            
            btn.innerHTML = '<i class="ph-bold ph-circle-notch ph-spin"></i> Processing...';
            try {
                await fetchAPI('/features/exam-schedule', { method: 'POST', body: formData });
                showAlert('success', 'Examination Schedule Updated!');
                loadScheduleAdmin();
            } catch (err) { showAlert('error', err.message); }
            finally { btn.innerHTML = '<i class="ph-bold ph-calendar-check"></i> Upload Exam'; }
        }

        async function uploadSectionSchedule(e) {
            e.preventDefault();
            const file = document.getElementById('section-file').files[0];
            const btn = document.getElementById('sec-btn');
            const formData = new FormData(); formData.append('section_schedule_image', file);
            
            btn.innerHTML = '<i class="ph-bold ph-circle-notch ph-spin"></i> Processing...';
            try {
                await fetchAPI('/features/section-schedule', { method: 'POST', body: formData });
                showAlert('success', 'Section Room Assignments Updated!');
                loadScheduleAdmin();
            } catch (err) { showAlert('error', err.message); }
            finally { btn.innerHTML = '<i class="ph-bold ph-map-trifold"></i> Upload Section Guide'; }
        }

        async function loadMaterialsAdmin() {
            pageTitle.textContent = 'Shared Materials';
            welcomeSub.textContent = 'Upload and manage institutional resources';
            startLoad();
            try {
                const data = await fetchAPI('/features/materials');
                contentArea.innerHTML = `
                    <div class="bento-grid">
                        <div class="bento-item bento-span-8 premium-card accent-azure animate-item-1" style="padding:0;">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Shared Educational Assets</span></div>
                            <div class="data-table-container">
                                <table class="table-premium">
                                    <thead><tr><th>Asset Title</th><th>Format</th><th>Date Uploaded</th></tr></thead>
                                    <tbody>
                                    ${!data.length ? '<tr><td colspan="3" style="text-align:center; padding:64px;"><i class="ph-bold ph-folder-open" style="font-size:48px; color:var(--text-light); opacity:0.2;"></i><br><span style="color:var(--text-light); font-size:15px;">No assets found in repository.</span></td></tr>' : data.map(row => `<tr><td style="font-weight:700; color:var(--primary); font-size:15px;">${row.title}</td><td><span class="badge badge-accent" style="padding:6px 10px; font-size:11px; font-weight:800;">${row.file_path.split('.').pop().toUpperCase()}</span></td><td><span style="color:var(--text-muted); font-weight:600;">${new Date(row.upload_date).toLocaleDateString()}</span></td></tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="bento-item bento-span-4 premium-card accent-emerald animate-item-2" style="padding:0;">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Quick Upload Hub</span></div>
                            <div style="padding:24px;">
                                <form onsubmit="uploadMaterial(event)">
                                    <div class="form-group"><label>Asset Label</label><input type="text" id="mat-title" class="form-control" placeholder="e.g. Physics Lab Guide" required></div>
                                    <div class="form-group"><label>Select File</label><input type="file" id="mat-file" class="form-control" required style="padding:10px;"></div>
                                    <button type="submit" class="btn btn-primary btn-block" style="padding:14px; border-radius:12px; font-weight:700;" id="mat-btn"><i class="ph-bold ph-upload-simple"></i> Publish to Portal</button>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
            } catch(e) { }
            endLoad();
        }
        async function uploadMaterial(e) {
            e.preventDefault(); const btn = document.getElementById('mat-btn'); btn.disabled = true;
            const formData = new FormData(); formData.append('material_file', document.getElementById('mat-file').files[0]); formData.append('title', document.getElementById('mat-title').value);
            try { await fetch('/api/features/materials', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData }); loadMaterialsAdmin(); } catch(err) { btn.disabled = false; }
        }

        function showAlert(msg, type = 'error', id = 'modal-alert') { const el = document.getElementById(id); el.textContent = msg; el.className = `alert alert-${type === 'error' ? 'error' : 'success'}`; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 5000); }

        // --- MOBILE SIDEBAR TOGGLE LOGIC ---
        const mobileToggle = document.getElementById('mobile-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuIcon = mobileToggle ? mobileToggle.querySelector('i') : null;

        function toggleSidebar() {
            sidebar.classList.toggle('mobile-active');
            overlay.classList.toggle('active');
            
            if (sidebar.classList.contains('mobile-active')) {
                menuIcon.classList.replace('ph-list', 'ph-x');
                document.body.style.overflow = 'hidden';
            } else {
                menuIcon.classList.replace('ph-x', 'ph-list');
                document.body.style.overflow = '';
            }
        }

        if (mobileToggle) {
            mobileToggle.addEventListener('click', toggleSidebar);
        }
        
        if (overlay) {
            overlay.addEventListener('click', toggleSidebar);
        }

        function checkMobile() {
            if (window.innerWidth <= 1024) {
                mobileToggle.style.display = 'block';
            } else {
                mobileToggle.style.display = 'none';
                sidebar.classList.remove('mobile-active');
                overlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', checkMobile);
        checkMobile();
    </script>
</body>
</html>
