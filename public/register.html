<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHCC Portal — Registration</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .auth-card {
            max-width: 520px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        .brand-accent {
            color: var(--primary);
            font-weight: 800;
        }
        .brand-accent span {
            color: var(--accent);
        }
    </style>
</head>
<body>
<body style="background: url('images/anniversary-bg.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; position: relative; padding: 40px 20px;">
    <!-- Background Overlay -->
    <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(10,37,64,0.9) 0%, rgba(45,108,192,0.7) 100%); backdrop-filter: blur(8px); z-index: 0;"></div>

    <div class="auth-container" style="position: relative; z-index: 1; width: 100%; max-width: 580px;">
        <div class="auth-card premium-card accent-blue" style="padding: 48px; border-radius: 32px; backdrop-filter: blur(40px) saturate(200%);">
            <div class="login-logo" style="text-align: center; margin-bottom: 40px;">
                <div class="logo-orb" style="width: 64px; height: 64px; background: rgba(45, 108, 192, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 32px; color: var(--primary-light);">
                    <i class="ph-bold ph-identification-card"></i>
                </div>
                <div class="brand-accent" style="font-size: 36px; font-family: 'Outfit', sans-serif; margin-bottom: 8px;">CHCC<span>Portal</span></div>
                <div class="tagline" style="color: var(--text-light); font-weight: 500;">New Student Enrollment Registration</div>
            </div>

            <div id="form-alert" class="alert"></div>

            <form id="register-form">
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                    <div class="form-group">
                        <label style="font-weight: 700; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">First Name</label>
                        <div class="input-wrapper" style="position: relative;">
                            <i class="ph-bold ph-user" style="position: absolute; left: 16px; top: 14px; font-size: 20px; color: var(--primary-light);"></i>
                            <input type="text" id="first_name" class="form-control" placeholder="Aria" required style="padding-left: 48px; height: 50px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="font-weight: 700; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Last Name</label>
                        <div class="input-wrapper" style="position: relative;">
                            <i class="ph-bold ph-user" style="position: absolute; left: 16px; top: 14px; font-size: 20px; color: var(--primary-light);"></i>
                            <input type="text" id="last_name" class="form-control" placeholder="Anderson" required style="padding-left: 48px; height: 50px;">
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="font-weight: 700; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Email Address</label>
                    <div class="input-wrapper" style="position: relative;">
                        <i class="ph-bold ph-envelope-simple" style="position: absolute; left: 16px; top: 14px; font-size: 20px; color: var(--primary-light);"></i>
                        <input type="email" id="email" class="form-control" placeholder="aria@example.com" required style="padding-left: 48px; height: 50px;">
                    </div>
                </div>

                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                    <div class="form-group">
                        <label style="font-weight: 700; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Date of Birth</label>
                        <div class="input-wrapper" style="position: relative;">
                            <i class="ph-bold ph-calendar" style="position: absolute; left: 16px; top: 14px; font-size: 20px; color: var(--primary-light);"></i>
                            <input type="date" id="dob" class="form-control" style="padding-left: 48px; height: 50px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="font-weight: 700; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Username</label>
                        <div class="input-wrapper" style="position: relative;">
                            <i class="ph-bold ph-at" style="position: absolute; left: 16px; top: 14px; font-size: 20px; color: var(--primary-light);"></i>
                            <input type="text" id="username" class="form-control" placeholder="STU-2024-XXXX" required style="padding-left: 48px; height: 50px;">
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 32px;">
                    <label style="font-weight: 700; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Create Password</label>
                    <div class="input-wrapper" style="position: relative;">
                        <i class="ph-bold ph-lock" style="position: absolute; left: 16px; top: 14px; font-size: 20px; color: var(--primary-light);"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-left: 48px; height: 50px;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="padding: 16px; font-size: 16px; font-weight: 800; border-radius: 14px; box-shadow: 0 10px 25px rgba(10, 37, 64, 0.2);">
                    Complete Registration <i class="ph-bold ph-check-circle"></i>
                </button>
            </form>

            <div class="text-center mt-4" style="text-align: center; margin-top: 32px; font-size: 0.9rem;">
                <p style="color: var(--text-light); font-weight: 500;">Already have an account? <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 800; border-bottom: 2px solid rgba(10, 37, 64, 0.1);">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function showAlert(msg, type = 'error') {
            const alert = document.getElementById('form-alert');
            alert.textContent = msg;
            alert.className = `alert alert-${type === 'error' ? 'error' : 'success'}`;
            alert.style.display = 'block';
            setTimeout(() => { alert.style.display = 'none'; }, 5000);
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value,
                dob: document.getElementById('dob').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            };

            const btn = e.target.querySelector('button');
            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-circle-notch ph-spin"></i> Registering...';
            btn.disabled = true;

            try {
                await fetchAPI('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                showAlert('Registration successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (err) {
                showAlert(err.message, 'error');
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
