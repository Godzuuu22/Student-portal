<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard — CHCC Portal</title>
    <link rel="stylesheet" href="../css/style.css?v=5">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-name">CHCC <span>Portal</span></div>
                <div class="brand-sub">Student Portal</div>
            </div>
            
            <div class="sidebar-user">
                <div class="avatar gold">S</div>
                <div class="sidebar-user-info">
                    <div class="name" id="sidebar-user-name">Loading...</div>
                    <div class="role-badge">Active Student</div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section-label">Main</div>
                <a href="#" class="nav-item active" id="nav-home">
                    <i class="ph-bold ph-house"></i> Home
                </a>
                <a href="#" class="nav-item" id="nav-profile">
                    <i class="ph-bold ph-user-circle"></i> Profile
                </a>
                <a href="#" class="nav-item" id="nav-enrollments">
                    <i class="ph-bold ph-books"></i> My Courses
                </a>
                
                <div class="nav-section-label">Academic</div>
                <a href="#" class="nav-item" id="nav-grades">
                    <i class="ph-bold ph-chart-bar"></i> Grades
                </a>
                <a href="#" class="nav-item" id="nav-attendance">
                    <i class="ph-bold ph-calendar-check"></i> Attendance
                </a>
                
                <div class="nav-section-label">Resources</div>
                <a href="#" class="nav-item" id="nav-announcements">
                    <i class="ph-bold ph-megaphone"></i> Announcements
                </a>
                <a href="#" class="nav-item" id="nav-schedule">
                    <i class="ph-bold ph-calendar"></i> Current Schedule
                </a>
                <a href="#" class="nav-item" id="nav-materials">
                    <i class="ph-bold ph-folder-open"></i> Materials
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout">
                    <i class="ph-bold ph-sign-out"></i> Sign Out
                </button>
            </div>
        </aside>
        
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        
        <main class="main-content">
            <header class="main-header">
                <div style="display:flex; align-items:center; gap:16px;">
                    <button id="mobile-toggle" style="display:none; background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer;">
                        <i class="ph-bold ph-list"></i>
                    </button>
                    <div>
                    <h1 id="page-title">Welcome Back</h1>
                    <div id="welcome-sub" class="subtitle-text" style="margin-bottom:0">Looking good today!</div>
                </div>
                <div class="header-actions" style="display:flex; align-items:center; gap:20px;">
                    <div class="search-bar" style="display: flex; align-items:center; background: rgba(0,0,0,0.03); border-radius: 12px; padding: 4px 16px;">
                        <i class="ph-bold ph-magnifying-glass" style="color:var(--text-light)"></i>
                        <input type="text" placeholder="Search portal..." style="border:none; background:transparent; padding:10px; font-size:14px; outline:none; width:200px;">
                    </div>
                    <div class="notif-btn" style="background:rgba(0,0,0,0.03); border-radius:12px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative;">
                        <i class="ph-bold ph-bell" style="font-size:20px; color:var(--primary)"></i>
                        <div class="notif-dot" style="position:absolute; top:12px; right:12px; width:8px; height:8px; background:var(--accent); border-radius:50%; border:2px solid var(--white);"></div>
                    </div>
                    <div class="header-date" id="current-date" style="font-weight:600; color:var(--text-muted); font-size:13px;"></div>
                </div>
            </header>

            <div id="content-area" class="page">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Image Modal (Lightbox) -->
    <div id="image-modal" class="modal-overlay" onclick="closeImageModal()" style="display:none; position:fixed; inset:0; background:rgba(10, 37, 64, 0.9); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(8px); cursor:zoom-out;">
        <span class="modal-close" style="position:absolute; top:30px; right:40px; font-size:40px; color:white; font-weight:bold; cursor:pointer;">&times;</span>
        <img id="modal-img" style="max-width:90%; max-height:90%; border-radius:12px; transform:scale(0.9); transition:0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow:0 0 100px rgba(0,0,0,0.5);">
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('current-date').textContent = new Date().toDateString();

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (!user || user.role !== 'student') {
                window.location.href = '../index.html';
                return;
            }
            
            document.getElementById('sidebar-user-name').textContent = user.name;
            document.querySelector('.avatar').textContent = user.name.charAt(0).toUpperCase();

            // Search logic
            const searchInput = document.querySelector('.search-bar input');
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const activeId = document.querySelector('.nav-item.active').id;
                
                if (activeId === 'nav-enrollments') {
                    document.querySelectorAll('.card').forEach(card => {
                        card.style.display = card.textContent.toLowerCase().includes(term) ? 'flex' : 'none';
                    });
                } else if (activeId === 'nav-materials') {
                    document.querySelectorAll('.data-table tbody tr').forEach(row => {
                        row.style.display = row.textContent.toLowerCase().includes(term) ? 'table-row' : 'none';
                    });
                }
            });
            
            loadHome();

            document.querySelectorAll('.nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    
                    const id = e.currentTarget.id;
                    if (id === 'nav-home') loadHome();
                    else if (id === 'nav-profile') loadProfile();
                    else if (id === 'nav-enrollments') loadEnrollments();
                    else if (id === 'nav-grades') loadGrades();
                    else if (id === 'nav-attendance') loadAttendance();
                    else if (id === 'nav-announcements') loadAnnouncements();
                    else if (id === 'nav-schedule') loadScheduleStudent();
                    else if (id === 'nav-materials') loadMaterials();
                });
            });
        });

        const contentArea = document.getElementById('content-area');
        const pageTitle = document.getElementById('page-title');
        const welcomeSub = document.getElementById('welcome-sub');

        function startLoad() {
            contentArea.innerHTML = `
                <div class="bento-grid" style="animation: fadeIn 0.3s ease;">
                    <div class="bento-item bento-span-4" style="padding:32px"><div class="skeleton-box skeleton-text"></div><div class="skeleton-box skeleton-title"></div></div>
                    <div class="bento-item bento-span-4" style="padding:32px"><div class="skeleton-box skeleton-text"></div><div class="skeleton-box skeleton-title"></div></div>
                    <div class="bento-item bento-span-4" style="padding:32px"><div class="skeleton-box skeleton-text"></div><div class="skeleton-box skeleton-title"></div></div>
                    <div class="bento-item bento-span-8" style="padding:32px; height: 300px;"><div class="skeleton-box skeleton-card" style="height:100%"></div></div>
                    <div class="bento-item bento-span-4" style="padding:32px; height: 300px;"><div class="skeleton-box skeleton-card" style="height:100%"></div></div>
                </div>
            `;
            contentArea.classList.remove('fade-in');
        }

        function endLoad() {
            contentArea.classList.add('fade-in');
            
            // Animate SVG Rings if present
            setTimeout(() => {
                document.querySelectorAll('.circle-value').forEach(ring => {
                    const pct = ring.getAttribute('stroke-dasharray').split(',')[0];
                    ring.style.strokeDasharray = `${pct}, 100`;
                });
            }, 100);
        }

        async function loadHome() {
            pageTitle.textContent = 'Learning Hub';
            welcomeSub.textContent = 'Your daily academic summary';
            startLoad();
            try {
                const [user, announcements] = await Promise.all([
                    fetchAPI('/student/profile'),
                    fetchAPI('/features/announcements')
                ]);

                let annHtml = announcements.length ? announcements.slice(0, 2).map(ann => `
                    <div style="padding:20px; border-bottom:1px solid rgba(0,0,0,0.03); display:flex; gap:16px;">
                        <div style="width:48px; height:48px; border-radius:12px; background:rgba(226, 183, 20, 0.1); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;"><i class="ph-bold ph-bell"></i></div>
                        <div>
                            <div style="font-weight:700; color:var(--primary); font-size:15px; margin-bottom:4px;">${ann.title}</div>
                            <div style="font-size:13px; color:var(--text-muted); line-height:1.5;">${ann.content.substring(0, 80)}...</div>
                            <div style="font-size:11px; font-weight:600; color:var(--text-light); margin-top:8px; text-transform:uppercase;">${new Date(ann.date).toLocaleDateString()}</div>
                        </div>
                    </div>
                `).join('') : '<div style="padding:32px; text-align:center; color:var(--text-light);"><i class="ph-light ph-megaphone" style="font-size:48px; margin-bottom:12px;"></i><br>No recent announcements</div>';

                // Calculate ring percentages
                const gpaPct = ((parseFloat(user.cumulative_gpa || 3.85) / 4.0) * 100).toFixed(0);
                const points = parseFloat(user.cumulative_gpa || 3.85);

                contentArea.innerHTML = `
                    <div class="bento-grid" style="margin-bottom:32px;">
                        <div class="bento-item bento-span-4 premium-card stat-card-premium accent-gold animate-item-1">
                            <i class="ph-bold ph-graduation-cap stat-icon-bg" style="color:var(--accent)"></i>
                            <div>
                                <div style="font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">Cumulative GPA</div>
                                <div style="font-family:'Outfit',sans-serif; font-size:44px; font-weight:800; color:var(--primary); line-height:1;">${user.cumulative_gpa || '3.85'}</div>
                                <div class="sparkline-trend trend-up"><i class="ph-bold ph-trend-up"></i> +0.12 this term</div>
                            </div>
                        </div>
                        <div class="bento-item bento-span-4 premium-card stat-card-premium accent-emerald animate-item-2">
                             <i class="ph-bold ph-calendar-check stat-icon-bg" style="color:var(--success)"></i>
                             <div>
                                 <div style="font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">Attendance Rate</div>
                                 <div style="font-family:'Outfit',sans-serif; font-size:44px; font-weight:800; color:var(--primary); line-height:1;">94%</div>
                                 <div class="sparkline-trend trend-up" style="background:rgba(16, 185, 129, 0.1); color:var(--success);"><i class="ph-bold ph-check-circle"></i> Regular Status</div>
                             </div>
                         </div>

                        <div class="bento-item bento-span-4 premium-card animate-item-3" style="padding:28px; background:linear-gradient(135deg, var(--primary), var(--primary-light)); color:white;">
                            <div style="font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">Semester 2 · 2026</div>
                            <div style="font-family:'Outfit',sans-serif; font-size:44px; font-weight:800; line-height:1; margin-bottom:12px;">6 <span style="font-size:24px; font-weight:500; opacity:0.8;">Courses</span></div>
                            <button class="btn" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; width:100%; backdrop-filter:blur(10px);" onclick="document.getElementById('nav-enrollments').click()">View Study Plan <i class="ph-bold ph-arrow-right"></i></button>
                        </div>

                        <div class="bento-item bento-span-8 premium-card accent-azure animate-item-4">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);">
                                <span class="card-title">Academic Progress Curve</span>
                                <div class="badge badge-accent" style="box-shadow: 0 4px 10px rgba(226, 183, 20, 0.2);">High Merit</div>
                            </div>
                            <div style="padding:24px; height:320px;">
                                <canvas id="performanceChart"></canvas>
                            </div>
                        </div>

                        <div class="bento-item bento-span-4 premium-card accent-violet animate-item-5">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Subject Proficiency</span></div>
                            <div style="padding:24px; height:320px;">
                                <canvas id="radarChart"></canvas>
                            </div>
                        </div>

                        <div class="bento-item bento-span-8 premium-card accent-cyan animate-item-6">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03);"><span class="card-title">Official Announcements</span> <a href="#" onclick="document.getElementById('nav-announcements').click()" style="font-size:13px; color:var(--primary-light); font-weight:700;">BROWSE ALL</a></div>
                            <div style="padding:0;">
                                ${annHtml}
                            </div>
                        </div>

                        <div class="bento-item bento-span-4 premium-card accent-amber animate-item-7" style="display:flex; flex-direction:column; align-items:center; text-align:center;">
                            <div class="card-header" style="background:transparent; border-bottom:1px solid rgba(0,0,0,0.03); width:100%;"><span class="card-title">Portal Shortcuts</span></div>
                            <div style="padding:24px; display:flex; flex-direction:column; gap:16px; width:100%;">
                                <div class="quick-action-card" onclick="document.getElementById('nav-schedule').click()" style="justify-content:center; text-align:center; flex-direction:column;">
                                    <div class="qa-icon qa-blue" style="margin:0 auto 8px;"><i class="ph-bold ph-calendar"></i></div>
                                    <div><div style="font-weight:700; font-size:14px; color:var(--primary)">Weekly Schedule</div><div style="font-size:11px; color:var(--text-muted)">Check your room assignments</div></div>
                                </div>
                                <div class="quick-action-card" onclick="document.getElementById('nav-materials').click()" style="justify-content:center; text-align:center; flex-direction:column;">
                                    <div class="qa-icon qa-gold" style="margin:0 auto 8px;"><i class="ph-bold ph-file-pdf"></i></div>
                                    <div><div style="font-weight:700; font-size:14px; color:var(--primary)">Study Resources</div><div style="font-size:11px; color:var(--text-muted)">Download latest handouts</div></div>
                                </div>
                                <div class="quick-action-card" onclick="document.getElementById('nav-profile').click()" style="justify-content:center; text-align:center; flex-direction:column;">
                                    <div class="qa-icon" style="background:rgba(5, 150, 105, 0.1); color:var(--success); margin:0 auto 8px;"><i class="ph-bold ph-identification-card"></i></div>
                                    <div><div style="font-weight:700; font-size:14px; color:var(--primary)">Student Identity</div><div style="font-size:11px; color:var(--text-muted)">Manage personal account</div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                endLoad();
                initStudentCharts();
                
                // Set the SVG dashboard rings with slight delay for animation
                setTimeout(() => {
                    const rings = document.querySelectorAll('.circle-value');
                    if(rings[0]) rings[0].setAttribute('stroke-dasharray', `${gpaPct}, 100`);
                    if(rings[1]) rings[1].setAttribute('stroke-dasharray', `94, 100`);
                }, 50);

            } catch (err) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${err.message}</div>`; }
        }

        function initStudentCharts() {
            // Line Chart
            const lineCtx = document.getElementById('performanceChart').getContext('2d');
            const lGradient = lineCtx.createLinearGradient(0, 0, 0, 300);
            lGradient.addColorStop(0, 'rgba(45, 108, 192, 0.4)');
            lGradient.addColorStop(1, 'rgba(45, 108, 192, 0)');

            new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: ['Midterms', 'Finals', 'Sem 1', 'Midterms 2', 'Current'],
                    datasets: [{
                        label: 'Weighted Average',
                        data: [1.75, 1.5, 1.6, 1.4, 1.25],
                        borderColor: '#2D6CC0',
                        borderWidth: 4,
                        pointRadius: 5,
                        pointBackgroundColor: '#fff',
                        fill: true,
                        backgroundColor: lGradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { reverse: true, grid: { color: 'rgba(0,0,0,0.03)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Radar Chart
            const radarCtx = document.getElementById('radarChart').getContext('2d');
            new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: ['Attendance', 'Grades', 'Participation', 'Completion', 'Behavior'],
                    datasets: [{
                        label: 'Student Metrics',
                        data: [94, 88, 75, 90, 95],
                        backgroundColor: 'rgba(226, 183, 20, 0.2)',
                        borderColor: '#E2B714',
                        borderWidth: 2,
                        pointBackgroundColor: '#E2B714'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(0,0,0,0.05)' },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { font: { size: 10, weight: '700' } },
                            ticks: { display: false }
                        }
                    }
                }
            });
        }

        async function loadProfile() {
            pageTitle.textContent = 'Student Identity';
            welcomeSub.textContent = 'Verified Academic Profile';
            startLoad();
            try {
                const data = await fetchAPI('/student/profile');
                const initials = (data.first_name.charAt(0) || '') + (data.last_name.charAt(0) || '');
                const avatarContent = data.profile_pic 
                    ? `<img src="${data.profile_pic}">`
                    : initials;
                
                contentArea.innerHTML = `
                    <div class="profile-header-clean animate-fade-up" style="padding: 24px 32px; background: rgba(255,255,255,0.4); border-radius: 24px; border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(10px);">
                        <div class="profile-avatar-container">
                            <div class="modern-profile-avatar">
                                ${avatarContent}
                            </div>
                        </div>

                        <div style="margin-top: 24px; display: flex; justify-content: space-between; align-items: flex-end;">
                            <div>
                                <h2 style="font-family:'Outfit',sans-serif; font-size:32px; color:var(--primary); margin-bottom:4px;">${data.first_name} ${data.last_name}</h2>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span class="badge badge-accent">STU-${new Date().getFullYear()}-${String(data.id).padStart(4, '0')}</span>
                                    <span class="badge badge-success" style="gap:4px;"><i class="ph-fill ph-check-circle"></i> Verified Student</span>
                                </div>
                            </div>
                            <div style="display:flex; gap:12px;">
                                <input type="file" id="profilePicInput" style="display:none;" accept="image/*" onchange="uploadProfilePic(event)">
                                <button class="btn btn-primary" onclick="document.getElementById('profilePicInput').click()" style="padding:10px 20px; border-radius:12px;">
                                    <i class="ph-bold ph-camera"></i> Update Photo
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="identity-grid-v2" style="margin-top:40px;">
                        <div class="identity-card-v2 stagger-1">
                            <div class="identity-icon-v2"><i class="ph-bold ph-envelope"></i></div>
                            <div class="identity-info-v2">
                                <div class="label">Personal Email</div>
                                <div class="value">${data.email}</div>
                            </div>
                        </div>
                        <div class="identity-card-v2 stagger-2">
                            <div class="identity-icon-v2"><i class="ph-bold ph-graduation-cap"></i></div>
                            <div class="identity-info-v2">
                                <div class="label">Primary Program</div>
                                <div class="value">${data.program || 'Computer Science'}</div>
                            </div>
                        </div>
                        <div class="identity-card-v2 stagger-3">
                            <div class="identity-icon-v2"><i class="ph-bold ph-calendar"></i></div>
                            <div class="identity-info-v2">
                                <div class="label">Year level</div>
                                <div class="value">Year ${data.year_level || '1'}</div>
                            </div>
                        </div>
                        <div class="identity-card-v2 stagger-4">
                            <div class="identity-icon-v2"><i class="ph-bold ph-cake"></i></div>
                            <div class="identity-info-v2">
                                <div class="label">Date of Birth</div>
                                <div class="value">${data.dob ? new Date(data.dob).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' }) : 'Not set'}</div>
                            </div>
                        </div>
                        <div class="identity-card-v2 stagger-5">
                            <div class="identity-icon-v2"><i class="ph-bold ph-book-open"></i></div>
                            <div class="identity-info-v2">
                                <div class="label">Current Term</div>
                                <div class="value">${data.current_semester || '2nd Semester'}</div>
                            </div>
                        </div>
                        <div class="identity-card-v2 stagger-6">
                            <div class="identity-icon-v2"><i class="ph-bold ph-shield-check"></i></div>
                            <div class="identity-info-v2">
                                <div class="label">Registration Date</div>
                                <div class="value">${new Date(data.created_at || Date.now()).toLocaleDateString()}</div>
                            </div>
                        </div>
                    </div>
                `;
                endLoad();
            } catch (err) { contentArea.innerHTML = `<div class="alert alert-error" style="display:block">${err.message}</div>`; }
        }

        async function loadEnrollments() {
            pageTitle.textContent = 'Learning Path';
            welcomeSub.textContent = 'Currently Enrolled Academic Units';
            startLoad();
            try {
                const data = await fetchAPI('/student/enrollments');
                if (data.length === 0) {
                    contentArea.innerHTML = `
                        <div class="premium-card" style="padding:100px; text-align:center;">
                            <i class="ph-bold ph-books" style="font-size:64px; color:var(--text-light); margin-bottom:24px;"></i>
                            <h3 style="color:var(--primary); font-family:'Outfit',sans-serif;">No Enrolled Courses</h3>
                            <p style="color:var(--text-muted);">Please coordinate with the Registrar for enrollment details.</p>
                        </div>
                    `;
                    return;
                }

                const vividClasses = ['vivid-violet', 'vivid-emerald', 'vivid-amber', 'vivid-rose', 'vivid-azure'];
                let html = `<div class="identity-grid-v2">`;
                
                data.forEach((row, index) => {
                    const prog = row.progress || Math.floor(Math.random() * 40 + 40);
                    const vividClass = vividClasses[index % vividClasses.length];
                    
                    // Dynamic Icon Logic
                    const name = row.name.toLowerCase();
                    let icon = 'ph-book-open-text';
                    if (name.includes('math') || name.includes('calc') || name.includes('stat')) icon = 'ph-calculator';
                    else if (name.includes('prog') || name.includes('code') || name.includes('data') || name.includes('computer')) icon = 'ph-code';

        async function uploadProfilePic(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('profile_pic', file);
            try {
                const res = await fetch('/api/student/profile-pic', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || 'Upload failed');
                // Reload profile page explicitly
                alert('Profile picture updated successfully!');
                const user = await checkAuth();
                if (user && user.profile_pic) {
                    const sbAvatar = document.querySelector('.sidebar .avatar');
                    sbAvatar.innerHTML = `<img src="${user.profile_pic}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">`;
                    sbAvatar.style.background = 'transparent';
                }
                loadProfile();
            } catch (err) {
                alert(err.message);
            }
        }

        // --- MOBILE SIDEBAR TOGGLE LOGIC ---
        const mobileToggle = document.getElementById('mobile-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuIcon = mobileToggle ? mobileToggle.querySelector('i') : null;

        function toggleSidebar() {
            sidebar.classList.toggle('mobile-active');
            overlay.classList.toggle('active');
            
            if (sidebar.classList.contains('mobile-active')) {
                menuIcon.classList.replace('ph-list', 'ph-x');
                document.body.style.overflow = 'hidden';
            } else {
                menuIcon.classList.replace('ph-x', 'ph-list');
                document.body.style.overflow = '';
            }
        }

        if (mobileToggle) {
            mobileToggle.addEventListener('click', toggleSidebar);
        }
        
        if (overlay) {
            overlay.addEventListener('click', toggleSidebar);
        }

        // Detect screen size for button visibility
        function checkMobile() {
            if (window.innerWidth <= 1024) {
                mobileToggle.style.display = 'block';
            } else {
                mobileToggle.style.display = 'none';
                sidebar.classList.remove('mobile-active');
                overlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', checkMobile);
        checkMobile();

        function viewImageModal(src) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = src;
            modal.style.display = 'flex';
            setTimeout(() => { modalImg.style.transform = 'scale(1)'; }, 10);
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.style.transform = 'scale(0.9)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
    </script>
